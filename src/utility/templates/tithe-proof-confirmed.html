<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Tithe Payment Confirmed</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px">
  <div style="max-width:600px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden">
    <div style="background:#1a3c6e;padding:24px;text-align:center">
      <h1 style="color:#fff;margin:0;font-size:20px">Tithe Payment Confirmed</h1>
    </div>
    <div style="padding:32px">
      <p>Dear {{name}},</p>
      <p>Great news! Your tithe payment proof has been reviewed and <strong>confirmed</strong> by the finance team.</p>
      <table style="width:100%;border-collapse:collapse;margin:16px 0">
        <tr><td style="padding:8px;border:1px solid #e0e0e0;font-weight:bold;background:#f9f9f9">Amount</td><td style="padding:8px;border:1px solid #e0e0e0">₦{{amount}}</td></tr>
        <tr><td style="padding:8px;border:1px solid #e0e0e0;font-weight:bold;background:#f9f9f9">Payment Date</td><td style="padding:8px;border:1px solid #e0e0e0">{{paymentDate}}</td></tr>
      </table>
      <p>Thank you for your faithfulness in tithing. God bless you!</p>
    </div>
    <div style="background:#f9f9f9;padding:16px;text-align:center;font-size:12px;color:#888">
      RCCG Discovery Centre
    </div>
  </div>
</body>
</html>
